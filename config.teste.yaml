# MitoCurator configuration file
#
# Use sempre caminhos completos/absolutos para arquivos de entrada,
# referências, reads, ferramentas externas e diretórios de saída.

project:
  name: Mcapixaba_mitocurator
  organism: "Melipona capixaba"
  topology: circular
  genetic_code: 5
  rotate_to: ND6

input:
  mitogenome: /home/thiagomafra/projetos/mitocurator/final_mitogenome.fasta
  reference_gb: /home/thiagomafra/projetos/mitocurator/Mscutellaris_mtDNA.gb

output:
  outdir: /home/thiagomafra/projetos/mitocurator/teste1_output

# Caminhos centralizados das reads.
# O read_support usa estes caminhos via source: reads.hifi e source: reads.illumina.
reads:
  hifi:
    - /data/reads/asf/capixaba/pacbio/CP743-001P0001/cell/hifi_capixaba_trimmed.fastq.gz

  illumina:
    r1: /data/reads/asf/capixaba/illumina/pcr-free/capixaba_pcrfree_good_R1.fq
    r2: /data/reads/asf/capixaba/illumina/pcr-free/capixaba_pcrfree_good_R2.fq

threads:
  total: 64
  mitofinder: 32
  blast: 48
  minimap2: 48
  samtools_view: 8
  samtools_sort: 16
  bcftools: 16
  mafft: 8
  report: 4

tools:
  minimap2: minimap2
  samtools: samtools
  bcftools: bcftools
  blastn: blastn
  tblastn: tblastn
  blastp: blastp
  mafft: mafft
  seqkit: seqkit
  arwen: arwen

mitofinder:
  enabled: true

  mode: python_interpreter
  python2: /usr/bin/python2.7
  script: /home/thiagomafra/bin/MitoFinder/mitofinder

  reference_gb: /home/thiagomafra/projetos/mitocurator/Mscutellaris_mtDNA.gb
  organism_code: 5
  threads: 8
  memory_gb: 40

  conda_executable: /full/path/to/conda
  conda_env: mitofinder_py2
  wrapper: /full/path/to/run_mitofinder.sh

annotation:
  run_mitofinder: true
  run_arwen: true
  run_mitfi: true
  run_trnascan: false

qc:
  major_overlap_bp: 20
  low_coverage_threshold: 5
  flag_internal_stops: true
  flag_truncated_genes: true

report:
  markdown: true
  tsv: true

refinement:
  enabled: true

  expected_gene_set:
    profile: metazoa_mito
    custom_file: null

  gene_name_profile: insect_mito

  annotate_at_rich: true
  at_rich_min_len: 500
  at_rich_min_at: 75.0

  find_missing_cds_candidates: true
  find_cds_refinement_candidates: true
  orf_min_nt: 150
  cds_refinement_window: 300

  compare_candidates_to_reference: true
  compare_problematic_cds_to_reference: true
  reference_similarity_min_identity: 25.0

reference:
  genbank: /home/thiagomafra/projetos/mitocurator/Mscutellaris_mtDNA.gb

read_support:
  enabled: true
  threads: 32
  min_base_quality: 20
  min_mapping_quality: 20
  flank_bp: 20
  reuse_existing_bam: true
  force_remap: false
  
  read_sets:
    - name: hifi
      type: pacbio_hifi
      source: reads.hifi

    - name: illumina
      type: illumina_pe
      source: reads.illumina

targeted_extraction:
  enabled: true
  flank_bp: 3000
  include_missing_gene_candidates: true
  include_problematic_cds: true
  include_consensus_correction_candidates: true
  max_reads_per_target: 5000
  min_mapping_quality: 20
  reuse_existing_outputs: true
  random_seed: 42

reconstruction_pools:
  enabled: true
  make_target_only: true
  make_mitogenome_mapped: true
  make_combined: true
  max_long_reads_per_pool: 10000
  max_short_pairs_per_pool: 20000
  min_mapping_quality: 20
  random_seed: 42
  reuse_existing_outputs: true

targeted_consensus:
  enabled: true
  pool_type: combined
  method: pileup
  consensus_backend: count_coverage
  threads: 16
  jobs: 1
  minimap2_threads: 8
  samtools_threads: 8
  target_filter: ND2
  read_set_filter: hifi
  max_targets: 1
  min_base_quality: 20
  min_mapping_quality: 20
  min_depth: 5
  majority_threshold: 0.7
  max_reads: 1000
  max_depth_per_position: 500
  orf_scan_mode: best_orf
  scan_six_frames: true
  min_orf_nt: 150
  max_orf_aa_factor: 1.5
  random_seed: 42
  compare_to_reference: true
  translate_consensus: true
  reuse_existing_outputs: false
