# MitoCurator configuration file
#
# IMPORTANT:
# Always use absolute/full paths for input files, references, reads,
# external tools and output directories.
#
# IMPORTANTE:
# Use sempre caminhos completos/absolutos para arquivos de entrada,
# referências, reads, ferramentas externas e diretórios de saída.
#
# Evite caminhos relativos, pois o pipeline cria subdiretórios internos
# e algumas ferramentas externas podem ser chamadas a partir de outros
# diretórios de trabalho.

project:
  name: Mcapixaba_mitocurator
  organism: "Melipona capixaba"
  topology: circular          # circular, linear, unknown
  genetic_code: 5            # 5=invertebrate mitochondrial; 2=vertebrate mitochondrial
  rotate_to: COX1            # gene inicial definido pelo usuário

input:
  mitogenome: /full/path/to/candidate_mitogenome.gb
  reference_gb: /full/path/to/reference_mitogenome.gb

output:
  outdir: /full/path/to/mitocurator_output

reads:
  hifi:
  pacbio_clr:
  ont:
  illumina_r1:
  illumina_r2:
  illumina_se:

threads:
  total: 64
  mitofinder: 32
  blast: 48
  minimap2: 48
  samtools_view: 8
  samtools_sort: 16
  bcftools: 16
  mafft: 8
  report: 4

tools:
  minimap2: minimap2
  samtools: samtools
  bcftools: bcftools
  blastn: blastn
  tblastn: tblastn
  blastp: blastp
  mafft: mafft
  seqkit: seqkit
  arwen: arwen

  mitofinder:
    enabled: true

    # Options:
    #   python_interpreter
    #   conda_env
    #   wrapper
    mode: python_interpreter

    # Used only when mode: python_interpreter
    # Example: /usr/bin/python2.7
    python2: /usr/bin/python2.7
    script: /full/path/to/MitoFinder/mitofinder

    # Used only when mode: conda_env
    conda_executable: /full/path/to/conda
    conda_env: mitofinder_py2

    # Used only when mode: wrapper
    wrapper: /full/path/to/run_mitofinder.sh

annotation:
  run_mitofinder: true
  run_arwen: true
  run_mitfi: true
  run_trnascan: false

qc:
  major_overlap_bp: 20
  low_coverage_threshold: 5
  flag_internal_stops: true
  flag_truncated_genes: true

report:
  markdown: true
  tsv: true

refinement:
  # Genetic code is resolved from: project.genetic_code -> genetic_code ->
  # annotation.genetic_code -> mitofinder.organism_code -> default(5).
  enabled: true

  # Backward-compatible old format still accepted:
  # expected_gene_set: insect_mito

  # New format:
  expected_gene_set:
    profile: metazoa_mito      # metazoa_mito | insect_mito | vertebrate_mito | minimal_mito | custom
    custom_file: null          # required only when profile: custom

  # Optional alias-normalization profile (kept for compatibility/evolution)
  gene_name_profile: insect_mito

  annotate_at_rich: true
  at_rich_min_len: 500
  at_rich_min_at: 75.0

  find_missing_cds_candidates: true
  find_cds_refinement_candidates: true
  orf_min_nt: 150
  cds_refinement_window: 300

# Example presets:
# 1) Insect/bee: project.genetic_code: 5 + expected_gene_set.profile: insect_mito or metazoa_mito
# 2) Vertebrate/fish/amphibian: project.genetic_code: 2 + expected_gene_set.profile: vertebrate_mito
# 3) Custom: expected_gene_set.profile: custom + expected_gene_set.custom_file: /path/expected_genes.tsv
