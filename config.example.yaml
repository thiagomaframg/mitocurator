# MitoCurator configuration file
#
# IMPORTANT:
# Always use absolute/full paths for input files, references, reads,
# external tools and output directories.
#
# IMPORTANTE:
# Use sempre caminhos completos/absolutos para arquivos de entrada,
# referências, reads, ferramentas externas e diretórios de saída.
#
# Evite caminhos relativos, pois o pipeline cria subdiretórios internos
# e algumas ferramentas externas podem ser chamadas a partir de outros
# diretórios de trabalho.

project:
  name: Mcapixaba_mitocurator
  organism: "Melipona capixaba"
  topology: circular          # circular, linear, unknown
  genetic_code: 5            # 5=invertebrate mitochondrial; 2=vertebrate mitochondrial
  rotate_to: COX1            # gene inicial definido pelo usuário

input:
  mitogenome: /full/path/to/candidate_mitogenome.gb
  reference_gb: /full/path/to/reference_mitogenome.gb

output:
  outdir: /full/path/to/mitocurator_output

reads:
  # Tecnologia das reads longas usadas para consenso local.
  # Valores aceitos: hifi | ont | clr | illumina
  # Define o preset do minimap2: hifi→map-hifi, ont→map-ont, clr→map-pb, illumina→sr
  technology: hifi
  hifi:
  pacbio_clr:
  ont:
  illumina_r1:
  illumina_r2:
  illumina_se:

threads:
  total: 64
  mitofinder: 32
  blast: 48
  minimap2: 48
  samtools_view: 8
  samtools_sort: 16
  bcftools: 16
  mafft: 8
  report: 4

tools:
  minimap2: minimap2
  samtools: samtools
  bcftools: bcftools
  blastn: blastn
  tblastn: tblastn
  blastp: blastp
  mafft: mafft
  seqkit: seqkit
  arwen: arwen

  mitofinder:
    enabled: true

    # Options:
    #   python_interpreter
    #   conda_env
    #   wrapper
    mode: python_interpreter

    # Used only when mode: python_interpreter
    # Example: /usr/bin/python2.7
    python2: /usr/bin/python2.7
    script: /full/path/to/MitoFinder/mitofinder

    # Used only when mode: conda_env
    conda_executable: /full/path/to/conda
    conda_env: mitofinder_py2

    # Used only when mode: wrapper
    wrapper: /full/path/to/run_mitofinder.sh

annotation:
  run_mitofinder: true
  run_arwen: true
  run_mitfi: true
  run_trnascan: false

qc:
  major_overlap_bp: 20
  low_coverage_threshold: 5
  flag_internal_stops: true
  flag_truncated_genes: true

report:
  markdown: true
  tsv: true

refinement:
  enabled: true
  expected_gene_set: insect_mito
  annotate_at_rich: true
  at_rich_min_len: 500
  at_rich_min_at: 75.0

  find_missing_cds_candidates: true
  find_cds_refinement_candidates: true
  orf_min_nt: 150
  cds_refinement_window: 300

local_consensus:
  # Habilitar etapa de reparo por consenso local de reads.
  enabled: true

  # Modo de operação:
  #   suggest  (default) — escreve candidatos em FASTA + audit log; GenBank inalterado.
  #   diagnose — apenas audit log; nenhum FASTA de candidato gerado.
  #   apply    — aplica candidatos aceitos ao GenBank; gera repaired.gb.
  # Fluxo recomendado: rodar suggest, revisar audit_log.jsonl, então rodar apply.
  mode: suggest

  flank_bp: 200                  # flancos adicionados à região do gene para mapeamento
  min_mq: 20                     # mapping quality mínimo (samtools view -q)
  min_depth: 5                   # profundidade mínima para chamar base; abaixo → N
  maj_freq: 0.70                 # frequência mínima do alelo majoritário por coluna
  mafft_max_reads: 500           # máximo de reads passadas ao MAFFT (subsample)
  mafft_gap_col_threshold: 0.50  # fração de gaps para deletar coluna (frameshift)
  max_n_fraction: 0.05           # fração máxima de Ns no candidato para aceitar
  completeness_min_ratio: 0.80   # comprimento mínimo vs. referência
  completeness_min_cov: 0.70     # cobertura de aa mínima no alinhamento vs. ref
  min_identity_pct: 70.0         # identidade proteica mínima vs. referência para aceitar
  min_read_pident: 75.0          # piso de identidade tblastn por read (~divergência de família)
  min_bimodal_gap: 1.0           # gap mínimo (pp) para declarar bimodalidade (filtro NUMT)
  tblastn_evalue: 1e-5
  shift_nt: 60                   # janela de busca de boundary (±shift_nt nt em cada extremo)
  length_tol_frac: 0.15          # tolerância de comprimento vs. referência no boundary scan
  max_stops_in_read: 0           # stops internos tolerados por read no filtro pré-MAFFT
  threads: 8
