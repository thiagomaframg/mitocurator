project:
  output_prefix: Mcapixaba_test1
  output_base_dir: /path/to/output_base
  organism: "Melipona capixaba"
  topology: circular
  genetic_code: 5
  rotate_to: ND6

input:
  mitogenome: /path/to/final_mitogenome.fasta

reference:
  genbank: /path/to/reference.gb

reads:
  long:
    - name: hifi
      type: pacbio_hifi
      reads:
        - /path/hifi.fastq.gz
    - name: ont
      type: ont
      reads:
        - /path/ont.fastq.gz
    - name: pacbio_clr
      type: pacbio_clr
      reads:
        - /path/clr.fastq.gz
  short:
    - name: illumina
      type: illumina_pe
      r1: /path/R1.fq.gz
      r2: /path/R2.fq.gz
    - name: illumina_se
      type: illumina_se
      reads:
        - /path/SE.fq.gz

profiles:
  expected_gene_set: metazoa_mito
  gene_name_profile: insect_mito

threads:
  total: 64
  mitofinder: 32
  minimap2: 32
  samtools_sort: 16

refinement:
  enabled: true
  expected_gene_set:
    profile: metazoa_mito
    custom_file: null
  gene_name_profile: insect_mito
  annotate_at_rich: true
  at_rich_min_len: 500
  at_rich_min_at: 75.0

read_support:
  enabled: true
  threads: 8
  reuse_existing_bam: true
  force_remap: false
  min_base_quality: 20
  min_mapping_quality: 20
  flank_bp: 20
  read_sets:
    - name: hifi
      type: pacbio_hifi
      source: reads.long.0.reads
    - name: illumina
      type: illumina_pe
      source: reads.short.0

targeted_extraction:
  enabled: true
  flank_bp: 3000
  include_missing_gene_candidates: true
  include_problematic_cds: true
  include_consensus_correction_candidates: true
  max_reads_per_target: 5000
  min_mapping_quality: 20
  reuse_existing_outputs: true
  random_seed: 42

# Advanced/compatibility options
output:
  outdir: /path/explicit_outdir

mitofinder:
  reference_gb: /path/legacy_reference.gb

